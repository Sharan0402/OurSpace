# Our Space — single-box deployment (backend + frontend + Caddy TLS).
# Reads secrets/config from deploy/.env  (copy deploy/.env.example → deploy/.env).
# Run from the deploy/ directory:  docker compose up -d --build

services:
  backend:
    build:
      context: ../backend
    restart: unless-stopped
    environment:
      APP_PERSISTENCE: dynamo
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      FRONTEND_ORIGIN: https://${DOMAIN}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APPY_USERNAME: ${APPY_USERNAME}
      APPY_PASSWORD: ${APPY_PASSWORD}
      LAKKU_USERNAME: ${LAKKU_USERNAME}
      LAKKU_PASSWORD: ${LAKKU_PASSWORD}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      SPOTIFY_REDIRECT_URI: https://${DOMAIN}/api/spotify/callback
    expose:
      - "8080"

  frontend:
    build:
      context: ..
      args:
        NEXT_PUBLIC_API_BASE_URL: https://${DOMAIN}
        NEXT_PUBLIC_WS_URL: wss://${DOMAIN}/ws
        NEXT_PUBLIC_APP_URL: https://${DOMAIN}
        NEXT_PUBLIC_USE_MOCKS: "false"
        NEXT_PUBLIC_REALTIME_LIVE: "true"
        NEXT_PUBLIC_SPOTIFY_LIVE: "true"
        NEXT_PUBLIC_SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
        NEXT_PUBLIC_SPOTIFY_REDIRECT_URI: https://${DOMAIN}/api/spotify/callback
    restart: unless-stopped
    expose:
      - "3000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  caddy_data:
  caddy_config:
